<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Eunice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4/animate.min.css"/>
    <style>
        body {
            background: linear-gradient(120deg, #ffb6c1, #ffe4e1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            color: #ff69b4;
        }
        .message {
            background-color: #f8f8f8;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .from {
            font-weight: bold;
            color: #ff69b4;
        }
    </style>
</head>
<body>
    <div id="root" class="container"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script type="text/babel">
        function BirthdayCard() {
            const greetings = [
                {from: 'Alice', text: 'Hope your birthday is as amazing as you are!'},
                {from: 'Bob', text: 'Cheers to another year of wonderful adventures.'},
                {from: 'Chris', text: 'Sending you lots of love and happiness today!'},
                {from: 'Dana', text: 'Happy 29th! Let the celebrations begin!'}
            ];
            const imageUrl = 'https://images.unsplash.com/photo-1608139746186-a9f81af07471?auto=format&fit=crop&w=500&q=60';
            return (
                <div className="card shadow p-4 text-center" style={{borderRadius:'1rem'}}>
                    <h1>Happy 29th Birthday, Eunice!</h1>
                    <img src={imageUrl} alt="Birthday cake" className="img-fluid rounded mb-3" />
                    <p>Wishing you a day filled with love, laughter, and all the joy you deserve!</p>
                    <div className="messages text-start">
                        {greetings.map((g, i) => (
                            <div key={i} className="message animate__animated animate__fadeInUp" style={{animationDelay: `${i * 0.5}s`}}>
                                <span className="from">{g.from}:</span> {g.text}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BirthdayCard />);
    </script>
</body>
</html>
